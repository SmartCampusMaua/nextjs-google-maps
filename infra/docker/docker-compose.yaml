# SmartCampus app stack (web + api) + telemetry Postgres.
#
# The app's own PostgreSQL (CIPA data) lives in the docker-compose.yml at the
# repo root — start that first: `docker compose up -d` from the repo root.
# This stack reaches it via host.docker.internal (mapped below for Linux
# compatibility; Docker Desktop provides it automatically on Mac/Windows).
#
# Run from THIS directory, passing the root .env explicitly so `${...}`
# substitution below (used for web's build args) resolves:
#
#   docker compose --env-file ../../.env up -d --build
#
# Subir:    docker compose --env-file ../../.env up -d --build
# Parar:    docker compose down
# Logs:     docker compose logs -f web api

services:
  postgres:
    image: postgres:18.1-alpine3.23
    container_name: telemetry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: SmartrCampusMaua/api:local
    container_name: smartcampus-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      # Overrides the .env default (localhost:5432, meant for native/host
      # dev) so the containerized API reaches the host-published Postgres
      # from docker-compose.yml at the repo root.
      DATABASE_URL: postgres://smartcampus:smartcampus@host.docker.internal:5432/smartcampus
    ports:
      - "3300:3300"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: SmartrCampusMaua/web:local
    container_name: smartcampus-web
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local

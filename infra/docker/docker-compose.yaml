# SmartCampus app stack — fully self-contained: web + api + their own
# Postgres, plus a separate telemetry Postgres. Nothing outside this file
# needs to be running first.
#
# Everything is built locally from apps/api/Dockerfile and apps/web/Dockerfile
# (context: repo root, for the pnpm/turbo workspace deps) — this never pulls
# from Docker Hub. Docker Hub is only used by CI to publish images for other
# hosts to pull; local `docker compose up` always builds from source.
#
# Run from THIS directory, passing the root .env explicitly so `${...}`
# substitution below (used for web's build args) resolves:
#
# Subir:    docker compose --env-file ../../.env up -d --build
# Parar:    docker compose down          (dados do app ficam no volume)
# Zerar:    docker compose down -v       (apaga os volumes — cuidado!)
# Logs:     docker compose logs -f web api

services:
  app-postgres:
    image: postgres:18
    container_name: smartcampus-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartcampus
      POSTGRES_PASSWORD: smartcampus
      POSTGRES_DB: smartcampus
    ports:
      - "5434:5432"
    volumes:
      # Na imagem postgres:18 o diretório de dados vive em /var/lib/postgresql
      - app_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcampus -d smartcampus"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:18.1-alpine3.23
    container_name: telemetry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: smartcampusmaua/api:local
    container_name: smartcampus-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      # Overrides the .env default (localhost:5432, meant for native/host
      # dev) with the in-network service name of app-postgres above.
      DATABASE_URL: postgres://smartcampus:smartcampus@app-postgres:5432/smartcampus
    ports:
      - "3300:3300"
    depends_on:
      app-postgres:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: smartcampusmaua/web:local
    container_name: smartcampus-web
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      # Server Components run inside this container, so they must reach the
      # api service by its Docker-internal name, not NEXT_PUBLIC_API_URL
      # (which is baked into the browser bundle and points at the host).
      API_INTERNAL_URL: http://api:3300
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  app_pgdata:
    driver: local
  postgres_data:
    driver: local

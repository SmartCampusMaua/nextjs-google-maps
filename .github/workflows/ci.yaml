name: web-workflow
on:
  push:
    branches:
      - develop
    paths:
      - "apps/api/**"
      - "apps/web/**"
      # - "packages/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: SmartrCampusMaua/api
            build-args: ""
          - name: web
            dockerfile: apps/web/Dockerfile
            image: SmartrCampusMaua/web
            build-args: |
              NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          # Build context is the repo root: this is a pnpm/turbo workspace, so
          # apps/api and apps/web both need the root lockfile + packages/types
          # to resolve their workspace:* dependency.
          context: .
          file: ${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.build-args }}
          push: true
          tags: ${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
